[workspace]
authors = ["yingziyu-llt <yingziyu-Lin@outlook.com>"]
channels = ["conda-forge","bioconda"]
name = "final_project"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
r-base = "4.1.*"
r-seurat = "4.*"
r-harmony = "*"
r-tidyverse = "*"
r-devtools = "*"
r-survival = "3.3.*"
r-survminer = "0.4.9.*"
bioconductor-infercnv = "*"
bioconductor-slingshot = "2.2.*"
bioconductor-tradeseq = "1.8.*"
bioconductor-gsva = "*"
bioconductor-complexheatmap = "*"
bioconductor-screpertoire = "*"
bioconductor-genomeinfodbdata = "*"
r-maxstat = "*"
r-pheatmap = "*"
r-registry = "*"
r-rngtools = "*"
r-gridbase = "*"
r-foreach = "*"
r-doparallel = "*"
r-reshape2 = "*"
r-colorspace = "*"
r-rcolorbrewer = "*"
bioconductor-fgsea = "*"
r-msigdbr = "*"
# [基础环境]
r-circlize = "*"
r-ineq = "*"
make = "*"
gcc = "*"     # 编译 NMF 需要
gxx = "*"     # 编译 NMF 需要
gfortran = "*" # 很多 R 包编译需要 Fortran
jupyter = ">=1.1.1,<2"
r-irkernel = ">=1.3.2,<2"

[tasks]
setup_r = "Rscript scripts/01_env_setup.R"
